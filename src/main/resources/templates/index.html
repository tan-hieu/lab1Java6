<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <title>Spring Security Lab</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family:
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
        background: #f3f4f6;
        color: #111827;
      }
      header {
        background: #111827;
        color: #f9fafb;
        padding: 12px 24px;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      header h1 {
        font-size: 18px;
        font-weight: 600;
      }
      nav a {
        color: #e5e7eb;
        text-decoration: none;
        margin-left: 12px;
        font-size: 14px;
      }
      nav a:hover {
        color: #60a5fa;
      }
      main {
        max-width: 800px;
        margin: 32px auto;
        padding: 24px;
        background: #ffffff;
        border-radius: 12px;
        box-shadow: 0 10px 25px rgba(15, 23, 42, 0.08);
      }
      .page-title {
        font-size: 24px;
        font-weight: 600;
        margin-bottom: 16px;
        color: #111827;
      }
      hr {
        border: none;
        border-top: 1px solid #e5e7eb;
        margin: 16px 0;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>Spring Security Lab</h1>
      <nav>
        <a th:href="@{/}">Home</a>
        <a th:href="@{/poly/url0}">URL0</a>
        <a th:href="@{/poly/url1}">URL1</a>
        <a th:href="@{/poly/url2}">URL2</a>
        <a th:href="@{/poly/url3}">URL3</a>
        <a th:href="@{/poly/url4}">URL4</a>
      </nav>
    </header>

    <main>
      <div class="page-title">Page: <b th:text="${message}"></b></div>
      <hr />
      <div th:replace="~{user-info}"></div>
    </main>
  </body>
</html>
